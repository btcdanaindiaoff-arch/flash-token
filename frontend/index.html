<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash Token Wallet Connect</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(120deg, #0f172a, #1e293b);
      }

      .card {
        width: min(92vw, 420px);
        padding: 24px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(8px);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 8px;
        font-size: 1.25rem;
      }

      p {
        margin-top: 0;
        color: #cbd5e1;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        color: #0f172a;
        background: #38bdf8;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        margin-top: 14px;
        font-size: 0.9rem;
        color: #e2e8f0;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Flash Token dApp</h1>
      <p>Connect your wallet to begin interacting with the token contract.</p>
      <button id="connectWalletBtn">Connect Wallet</button>
      <div class="status" id="walletStatus">Wallet not connected.</div>
    </main>

    <script src="./wallet-connect.js"></script>
  </body>
</html>
