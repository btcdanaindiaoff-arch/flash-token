<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FLASH Swap dApp</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: #0f172a;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --primary: #22d3ee;
        --danger: #f87171;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #0f172a, var(--bg));
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        display: grid;
        place-items: center;
      }

      .app {
        width: min(94vw, 560px);
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 20px 35px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.35rem;
      }

      .subtitle {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .top-row {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 12px;
        font-weight: 600;
        cursor: pointer;
      }

      #connectBtn {
        background: var(--primary);
        color: #082f49;
      }

      .swap-card {
        background: var(--panel);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 14px;
        padding: 14px;
        margin-top: 10px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        background: #1e293b;
        color: var(--text);
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 12px;
        font-size: 1rem;
      }

      #swapBtn {
        margin-top: 12px;
        background: #38bdf8;
        color: #082f49;
      }

      .meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.87rem;
        line-height: 1.45;
      }

      .status {
        min-height: 22px;
        margin-top: 12px;
        font-size: 0.9rem;
      }

      .error {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>FLASH ↔ mUSDC Swap</h1>
      <p class="subtitle">MetaMask + EVM swap dApp using a constant-product pool.</p>

      <div class="top-row">
        <button id="connectBtn">Connect MetaMask</button>
      </div>

      <div class="swap-card">
        <div class="row"><strong>From</strong><span id="balanceIn">Balance: -</span></div>
        <input id="amountIn" type="number" min="0" step="any" placeholder="Amount of FLASH" />

        <div class="row" style="margin-top:12px;"><strong>To (estimated)</strong><span id="balanceOut">Balance: -</span></div>
        <input id="amountOut" type="text" placeholder="Estimated mUSDC" disabled />

        <button id="swapBtn">Swap FLASH → mUSDC</button>

        <div class="meta" id="poolInfo">Pool reserves: -</div>
        <div class="status" id="status"></div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
